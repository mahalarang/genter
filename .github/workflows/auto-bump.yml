name: Auto Bump Version

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Determine bump type
        id: bump-type
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qiE '^([a-z]+)!:'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$TITLE" | grep -qiE '^BREAKING CHANGE'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$TITLE" | grep -qiE '^feat'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi
          echo "Bump type: $(cat $GITHUB_OUTPUT | grep type=)"

      - name: Get current version
        id: current-version
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "current=${VERSION}" >> $GITHUB_OUTPUT
          echo "Current version: ${VERSION}"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bump version
        run: |
          cd packages/core
          npm version ${{ steps.bump-type.outputs.type }} --no-git-tag-version
          cd ../..

      - name: Get new version
        id: new-version
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "New version: v${VERSION}"

      - name: Update tag choices in publish workflow
        run: |
          NEW_TAG="${{ steps.new-version.outputs.version }}"
          sed -i "/^[[:space:]]*options:/a\\          - ${NEW_TAG}" .github/workflows/publish.yml

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/core/package.json .github/workflows/publish.yml
          git commit -m "chore: bump version to ${{ steps.new-version.outputs.version }} [skip ci]"
          git tag "${{ steps.new-version.outputs.version }}"
          git push origin main --tags
