name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v0.1.0)'
        required: true
        type: string
        default: 'v0.1.0'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter genter build

      - name: Verify version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./packages/core/package.json').version")"
          TAG="${{ github.event.inputs.tag }}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "❌ Version mismatch! package.json: ${PKG_VERSION}, tag: ${TAG}"
            exit 1
          fi
          echo "✅ Version match: ${PKG_VERSION}"

      - name: Publish to npm
        run: pnpm publish --filter genter --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
